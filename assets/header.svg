<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0a1225"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#009DFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="gline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sglow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="tw"><rect x="0" y="0" width="140" height="20"/></clipPath>
    <clipPath id="boxClip"><rect x="0" y="0" width="380" height="120"/></clipPath>
  </defs>

  <style>
    .tt{font:13px 'Courier New',Consolas,monospace;fill:#00E5FF;white-space:pre}
    .bt{font:13px 'Courier New',Consolas,monospace;fill:#EAFBFF;white-space:pre}
    .nm{font:bold 11px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#4FC3F7}
    .tbar{font:11px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#4FC3F7;opacity:0.7}

    @keyframes type{
      from{clip-path:inset(0 100% 0 0)}
      to{clip-path:inset(0 0 0 0)}
    }
    .t0{animation:type 0.12s steps(1,end) 0.2s forwards;clip-path:inset(0 100% 0 0)}
    .t1{animation:type 0.12s steps(1,end) 0.32s forwards;clip-path:inset(0 100% 0 0)}
    .t2{animation:type 0.12s steps(1,end) 0.44s forwards;clip-path:inset(0 100% 0 0)}
    .t3{animation:type 0.12s steps(1,end) 0.56s forwards;clip-path:inset(0 100% 0 0)}
    .t4{animation:type 0.12s steps(1,end) 0.68s forwards;clip-path:inset(0 100% 0 0)}
    .t5{animation:type 0.12s steps(1,end) 0.80s forwards;clip-path:inset(0 100% 0 0)}
    .t6{animation:type 0.12s steps(1,end) 0.92s forwards;clip-path:inset(0 100% 0 0)}
    .t7{animation:type 0.12s steps(1,end) 1.04s forwards;clip-path:inset(0 100% 0 0)}
    .t8{animation:type 0.12s steps(1,end) 1.16s forwards;clip-path:inset(0 100% 0 0)}
    .t9{animation:type 0.12s steps(1,end) 1.28s forwards;clip-path:inset(0 100% 0 0)}

    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    .cur{animation:blink 1s step-end infinite}

    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .fi{opacity:0;animation:fadeIn 0.6s ease-out forwards}
    .fi1{animation-delay:1.8s}.fi2{animation-delay:1.95s}.fi3{animation-delay:2.1s}
    .fi4{animation-delay:2.25s}.fi5{animation-delay:2.4s}.fi6{animation-delay:2.55s}

    @keyframes scan{0%{y:-3}100%{y:200}}
    .scan{animation:scan 4s linear infinite}

    @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}

    @keyframes fl1{0%{transform:translate(0,0)}25%{transform:translate(8px,-12px)}50%{transform:translate(-4px,-22px)}75%{transform:translate(12px,-10px)}100%{transform:translate(0,0)}}
    @keyframes fl2{0%{transform:translate(0,0)}25%{transform:translate(-10px,-8px)}50%{transform:translate(6px,-18px)}75%{transform:translate(-14px,-6px)}100%{transform:translate(0,0)}}
    @keyframes fl3{0%{transform:translate(0,0)}33%{transform:translate(12px,-16px)}66%{transform:translate(-8px,-10px)}100%{transform:translate(0,0)}}
    @keyframes fl4{0%{transform:translate(0,0)}50%{transform:translate(-6px,-20px)}100%{transform:translate(0,0)}}

    .p1{animation:fl1 8s ease-in-out infinite, pulse 4s ease-in-out infinite}
    .p2{animation:fl2 7s ease-in-out infinite, pulse 3s ease-in-out infinite 1s}
    .p3{animation:fl3 9s ease-in-out infinite, pulse 5s ease-in-out infinite 2s}
    .p4{animation:fl4 6s ease-in-out infinite, pulse 3.5s ease-in-out infinite 0.5s}

    @keyframes dotPulse{0%,100%{opacity:0.7;filter:url(#sglow)}50%{opacity:1;filter:url(#glow)}}
    .dp{animation:dotPulse 3s ease-in-out infinite}

    @keyframes borderGlow{
      0%,100%{stroke-opacity:0.3;filter:none}
      50%{stroke-opacity:0.7;filter:url(#sglow)}
    }
    .bglow{animation:borderGlow 4s ease-in-out infinite}

    @keyframes hudFade{0%,100%{opacity:0.15}50%{opacity:0.4}}
    .hud{animation:hudFade 5s ease-in-out infinite}
  </style>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Terminal Window -->
  <rect x="30" y="10" width="840" height="180" rx="10" fill="#0c1228" opacity="0.95"/>
  <rect x="30" y="10" width="840" height="180" rx="10" fill="none" stroke="url(#border)" stroke-width="1.5" class="bglow"/>

  <!-- Inner glow line top -->
  <line x1="50" y1="38" x2="850" y2="38" stroke="url(#gline)" stroke-width="0.5"/>

  <!-- Title Bar -->
  <rect x="30" y="10" width="840" height="28" rx="10" fill="#080e20" opacity="0.9"/>
  <rect x="30" y="28" width="840" height="1" fill="#009DFF" opacity="0.15"/>

  <!-- Title bar dots -->
  <circle cx="50" cy="24" r="4.5" fill="#0066CC" opacity="0.8" class="dp"/>
  <circle cx="68" cy="24" r="4.5" fill="#009DFF" opacity="0.8" class="dp" style="animation-delay:0.5s"/>
  <circle cx="86" cy="24" r="4.5" fill="#4FC3F7" opacity="0.8" class="dp" style="animation-delay:1s"/>

  <!-- Title bar text -->
  <text x="450" y="28" text-anchor="middle" class="tbar">omer@arch ~ % terminal</text>

  <!-- Scan lines overlay -->
  <g opacity="0.06">
    <line x1="30" y1="45" x2="870" y2="45" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="55" x2="870" y2="55" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="65" x2="870" y2="65" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="75" x2="870" y2="75" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="85" x2="870" y2="85" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="95" x2="870" y2="95" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="105" x2="870" y2="105" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="115" x2="870" y2="115" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="125" x2="870" y2="125" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="135" x2="870" y2="135" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="145" x2="870" y2="145" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="155" x2="870" y2="155" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="165" x2="870" y2="165" stroke="#00E5FF" stroke-width="0.5"/>
    <line x1="30" y1="175" x2="870" y2="175" stroke="#00E5FF" stroke-width="0.5"/>
  </g>

  <!-- Animated scan line -->
  <rect x="30" y="0" width="840" height="3" fill="#00E5FF" opacity="0.04" class="scan"/>

  <!-- HUD corner accents -->
  <g class="hud" filter="url(#sglow)">
    <line x1="40" y1="45" x2="40" y2="55" stroke="#009DFF" stroke-width="1.5"/>
    <line x1="40" y1="45" x2="50" y2="45" stroke="#009DFF" stroke-width="1.5"/>
    <line x1="860" y1="45" x2="860" y2="55" stroke="#009DFF" stroke-width="1.5"/>
    <line x1="860" y1="45" x2="850" y2="45" stroke="#009DFF" stroke-width="1.5"/>
    <line x1="40" y1="175" x2="40" y2="165" stroke="#009DFF" stroke-width="1.5"/>
    <line x1="40" y1="175" x2="50" y2="175" stroke="#009DFF" stroke-width="1.5"/>
    <line x1="860" y1="175" x2="860" y2="165" stroke="#009DFF" stroke-width="1.5"/>
    <line x1="860" y1="175" x2="850" y2="175" stroke="#009DFF" stroke-width="1.5"/>
  </g>

  <!-- Floating particles -->
  <g filter="url(#sglow)">
    <circle cx="120" cy="70" r="1" fill="#00E5FF" opacity="0.6" class="p1"/>
    <circle cx="250" cy="130" r="1.2" fill="#4FC3F7" opacity="0.5" class="p2"/>
    <circle cx="380" cy="60" r="0.8" fill="#33CCFF" opacity="0.6" class="p3"/>
    <circle cx="520" cy="150" r="1" fill="#009DFF" opacity="0.4" class="p4"/>
    <circle cx="660" cy="85" r="0.9" fill="#00E5FF" opacity="0.5" class="p1" style="animation-delay:2s"/>
    <circle cx="750" cy="140" r="1.1" fill="#4FC3F7" opacity="0.45" class="p2" style="animation-delay:1.5s"/>
    <circle cx="180" cy="155" r="0.7" fill="#33CCFF" opacity="0.55" class="p3" style="animation-delay:3s"/>
    <circle cx="600" cy="65" r="1" fill="#009DFF" opacity="0.5" class="p4" style="animation-delay:2.5s"/>
    <circle cx="440" cy="145" r="0.8" fill="#00E5FF" opacity="0.45" class="p1" style="animation-delay:4s"/>
    <circle cx="310" cy="55" r="0.9" fill="#4FC3F7" opacity="0.55" class="p2" style="animation-delay:3.5s"/>
  </g>

  <!-- Typing text: "$ fastfetch" -->
  <g filter="url(#glow)">
    <text x="399" y="52" class="tt">
      <tspan class="t0">$</tspan><tspan class="t1"> </tspan><tspan class="t2">f</tspan><tspan class="t3">a</tspan><tspan class="t4">s</tspan><tspan class="t5">t</tspan><tspan class="t6">f</tspan><tspan class="t7">e</tspan><tspan class="t8">t</tspan><tspan class="t9">c</tspan><tspan>h</tspan>
    </text>
  </g>

  <!-- Blinking cursor -->
  <g filter="url(#sglow)">
    <rect x="498" y="40" width="8" height="15" rx="1" fill="#00E5FF" class="cur"/>
  </g>

  <!-- ASCII Art Box - fades in after typing -->
  <g filter="url(#glow)">
    <text x="270" y="78" class="bt fi fi1">╔═══════════════════════════════════════════╗</text>
    <text x="270" y="93" class="bt fi fi2">║  Ömer Tahir Üstün                         ║</text>
    <text x="270" y="108" class="bt fi fi3">║  Software Engineering Student              ║</text>
    <text x="270" y="123" class="bt fi fi4">║  Istanbul Sabahattin Zaim University       ║</text>
    <text x="270" y="138" class="bt fi fi5">║                                            ║</text>
    <text x="270" y="153" class="bt fi fi5">║  Build. Learn. Repeat.                     ║</text>
    <text x="270" y="168" class="bt fi fi6">╚═══════════════════════════════════════════╝</text>
  </g>

  <!-- Neon accent lines at bottom -->
  <line x1="40" y1="185" x2="860" y2="185" stroke="url(#gline)" stroke-width="0.5" opacity="0.5"/>
</svg>

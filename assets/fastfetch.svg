    <text x="25" y="217" class="mono ascii-line a12" fill="#009DFF" opacity="0.4">  └──────────────┘</text>
  </g>

  <!-- ═══ DIVIDER LINE ═══ -->
  <line x1="195" y1="45" x2="195" y2="345" stroke="#112240" stroke-width="1" opacity="0.6"/>
  <line x1="195" y1="45" x2="195" y2="345" stroke="#00E5FF" stroke-width="0.5" opacity="0.15" stroke-dasharray="4 8">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="850" height="300">
  <style>
    @keyframes pulseRing {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes typeLine {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    @keyframes borderGlow {
      0%, 100% { stroke-opacity: 0.4; }
      50% { stroke-opacity: 0.8; }
    }
    .info-line {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      opacity: 0;
      animation: typeLine 0.3s steps(1) forwards;
    }
    .line1 { animation-delay: 0.5s; }
    .line2 { animation-delay: 0.7s; }
    .line3 { animation-delay: 0.9s; }
    .line4 { animation-delay: 1.1s; }
    .line5 { animation-delay: 1.3s; }
    .line6 { animation-delay: 1.5s; }
    .line7 { animation-delay: 1.7s; }
    .line8 { animation-delay: 1.9s; }
    .line9 { animation-delay: 2.1s; }
    .ring-pulse {
      animation: pulseRing 3s ease-in-out infinite;
    }
    .cursor {
      animation: cursorBlink 1s step-end infinite;
    }
    .frame-glow {
      animation: borderGlow 4s ease-in-out infinite;
    }
  </style>

  <defs>
    <clipPath id="photoClip">
      <circle cx="100" cy="125" r="75"/>
    </clipPath>
  </defs>

  <!-- Terminal frame -->
  <rect x="0" y="0" width="850" height="300" rx="8" ry="8"
        fill="#0A0F1E" stroke="#112240" stroke-width="1"
        class="frame-glow"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="850" height="28" rx="8" ry="8" fill="#0D1117"/>
  <rect x="0" y="20" width="850" height="8" fill="#0D1117"/>

  <!-- Title bar dots -->
  <circle cx="15" cy="14" r="5" fill="#009DFF"/>
  <circle cx="25" cy="14" r="5" fill="#4FC3F7"/>
  <circle cx="35" cy="14" r="5" fill="#00E5FF"/>

  <!-- Title text -->
  <text x="55" y="18" font-family="monospace" font-size="11" fill="#4FC3F7" opacity="0.6">terminal — fastfetch</text>

  <!-- Profile photo -->
  <image href="profile.gif" x="25" y="50" width="150" height="150"
         clip-path="url(#photoClip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- Pulsing ring around photo -->
  <circle cx="100" cy="125" r="77" fill="none" stroke="#00E5FF" stroke-width="1.5"
          class="ring-pulse"/>

  <!-- Name -->
  <text x="100" y="155" font-family="'Segoe UI', Helvetica, sans-serif" font-size="14"
        font-weight="bold" fill="#00E5FF" text-anchor="middle">Ömer Tahir Üstün</text>

  <!-- Title -->
  <text x="100" y="170" font-family="'Segoe UI', Helvetica, sans-serif" font-size="11"
        fill="#4FC3F7" text-anchor="middle">Software Engineering</text>

  <!-- University -->
  <text x="100" y="183" font-family="'Segoe UI', Helvetica, sans-serif" font-size="10"
        fill="#009DFF" text-anchor="middle">Istanbul Sabahattin Zaim University</text>

  <!-- System info lines -->
  <g transform="translate(210, 45)">
    <!-- OS -->
    <text class="info-line line1" y="0">
      <tspan fill="#00E5FF">OS:        </tspan>
      <tspan fill="#EAFBFF">Arch Linux x86_64</tspan>
    </text>
    <!-- Kernel -->
    <text class="info-line line2" y="20">
      <tspan fill="#00E5FF">Kernel:    </tspan>
      <tspan fill="#EAFBFF">6.x.x-zen1-1-zen</tspan>
    </text>
    <!-- Shell -->
    <text class="info-line line3" y="40">
      <tspan fill="#00E5FF">Shell:     </tspan>
      <tspan fill="#EAFBFF">zsh 5.9</tspan>
    </text>
    <!-- Editor -->
    <text class="info-line line4" y="60">
      <tspan fill="#00E5FF">Editor:    </tspan>
      <tspan fill="#EAFBFF">Neovim 0.10+</tspan>
    </text>
    <!-- IDE -->
    <text class="info-line line5" y="80">
      <tspan fill="#00E5FF">IDE:       </tspan>
      <tspan fill="#EAFBFF">JetBrains Rider / VS Code</tspan>
    </text>
    <!-- Backend -->
    <text class="info-line line6" y="100">
      <tspan fill="#00E5FF">Backend:   </tspan>
      <tspan fill="#EAFBFF">ASP.NET Core · MongoDB · Redis · Kafka</tspan>
    </text>
    <!-- Frontend -->
    <text class="info-line line7" y="120">
      <tspan fill="#00E5FF">Frontend:  </tspan>
      <tspan fill="#EAFBFF">React Native</tspan>
    </text>
    <!-- Languages -->
    <text class="info-line line8" y="140">
      <tspan fill="#00E5FF">Languages: </tspan>
      <tspan fill="#EAFBFF">C# · Java · Kotlin · C++ · SQL</tspan>
    </text>
    <!-- GitHub -->
    <text class="info-line line9" y="160">
      <tspan fill="#00E5FF">GitHub:    </tspan>
      <tspan fill="#EAFBFF">@omertahirustun</tspan>
    </text>
  </g>

  <!-- Bottom quote -->
  <text x="425" y="275" font-family="'Segoe UI', Helvetica, sans-serif" font-size="12"
        font-style="italic" fill="#4FC3F7" text-anchor="middle"
        opacity="0">
    Build. Learn. Repeat.
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="2.3s" fill="freeze"/>
  </text>
  <text x="505" y="275" font-family="monospace" font-size="12" fill="#00E5FF"
        class="cursor" opacity="0">
    |
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="2.3s" fill="freeze"/>
  </text>
</svg>
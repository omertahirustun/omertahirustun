<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" width="920" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="50%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#050816"/>
    </linearGradient>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.1"/>
      <stop offset="30%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#33CCFF" stop-opacity="1"/>
      <stop offset="70%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#33CCFF"/>
      <stop offset="100%" stop-color="#009DFF"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#009DFF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00E5FF" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#00E5FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heavyGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="termClip"><rect x="0" y="0" width="920" height="380" rx="10"/></clipPath>
  </defs>

  <style>
    @font-face { font-family: 'Mono'; }
    .mono { font: 12px 'Courier New', Consolas, 'Liberation Mono', monospace; }
    .mono-sm { font: 11px 'Courier New', Consolas, monospace; }
    .mono-lg { font: bold 13px 'Courier New', Consolas, monospace; }
    .sans { font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .sans-sm { font: 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .sans-lg { font: bold 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    @keyframes typeLine {
      from { clip-path: inset(0 100% 0 0); opacity: 0; }
      to { clip-path: inset(0 0% 0 0); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes scanMove {
      0% { transform: translateY(-40px); }
      100% { transform: translateY(400px); }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes barFill {
      from { width: 0; }
    }
    @keyframes particle1 {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translate(80px, -60px); opacity: 0; }
    }
    @keyframes particle2 {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translate(-60px, -80px); opacity: 0; }
    }
    @keyframes particle3 {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translate(40px, 70px); opacity: 0; }
    }
    @keyframes dashMove {
      to { stroke-dashoffset: -20; }
    }

    .line { opacity: 0; }
    .l0 { animation: typeLine 0.3s steps(20,end) 0.3s forwards; }
    .l1 { animation: typeLine 0.3s steps(20,end) 0.6s forwards; }
    .l2 { animation: typeLine 0.3s steps(20,end) 0.9s forwards; }
    .l3 { animation: typeLine 0.3s steps(20,end) 1.2s forwards; }
    .l4 { animation: typeLine 0.3s steps(20,end) 1.5s forwards; }
    .l5 { animation: typeLine 0.3s steps(20,end) 1.8s forwards; }
    .l6 { animation: typeLine 0.3s steps(20,end) 2.1s forwards; }
    .l7 { animation: typeLine 0.3s steps(20,end) 2.4s forwards; }
    .l8 { animation: typeLine 0.3s steps(20,end) 2.7s forwards; }
    .l9 { animation: typeLine 0.3s steps(20,end) 3.0s forwards; }
    .l10 { animation: typeLine 0.3s steps(20,end) 3.3s forwards; }
    .l11 { animation: typeLine 0.3s steps(20,end) 3.6s forwards; }
    .l12 { animation: typeLine 0.3s steps(20,end) 3.9s forwards; }
    .l13 { animation: typeLine 0.3s steps(20,end) 4.2s forwards; }
    .l14 { animation: typeLine 0.3s steps(20,end) 4.5s forwards; }

    .ascii-line { opacity: 0; }
    .a0 { animation: typeLine 0.4s steps(30,end) 0.2s forwards; }
    .a1 { animation: typeLine 0.4s steps(30,end) 0.35s forwards; }
    .a2 { animation: typeLine 0.4s steps(30,end) 0.5s forwards; }
    .a3 { animation: typeLine 0.4s steps(30,end) 0.65s forwards; }
    .a4 { animation: typeLine 0.4s steps(30,end) 0.8s forwards; }
    .a5 { animation: typeLine 0.4s steps(30,end) 0.95s forwards; }
    .a6 { animation: typeLine 0.4s steps(30,end) 1.1s forwards; }
    .a7 { animation: typeLine 0.4s steps(30,end) 1.25s forwards; }
    .a8 { animation: typeLine 0.4s steps(30,end) 1.4s forwards; }
    .a9 { animation: typeLine 0.4s steps(30,end) 1.55s forwards; }
    .a10 { animation: typeLine 0.4s steps(30,end) 1.7s forwards; }
    .a11 { animation: typeLine 0.4s steps(30,end) 1.85s forwards; }
    .a12 { animation: typeLine 0.4s steps(30,end) 2.0s forwards; }

    .bar-anim { animation: barFill 0.8s ease-out forwards; }
  </style>

  <!-- Terminal background -->
  <rect width="920" height="380" rx="10" fill="url(#bg)" clip-path="url(#termClip)"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="919" height="379" rx="10" fill="none" stroke="url(#borderGlow)" stroke-width="1.5"/>

  <!-- Corner accents -->
  <path d="M 2 20 L 2 2 L 20 2" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>
  <path d="M 900 2 L 918 2 L 918 20" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>
  <path d="M 2 360 L 2 378 L 20 378" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>
  <path d="M 900 378 L 918 378 L 918 360" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="920" height="30" rx="10" fill="#0D1117"/>
  <rect x="0" y="20" width="920" height="10" fill="#0D1117"/>
  <line x1="0" y1="30" x2="920" y2="30" stroke="#112240" stroke-width="0.5"/>

  <!-- Title bar dots -->
  <circle cx="16" cy="15" r="5" fill="#009DFF" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="34" cy="15" r="5" fill="#4FC3F7" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="52" cy="15" r="5" fill="#00E5FF" opacity="0.8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <text x="72" y="19" class="sans-sm" fill="#4FC3F7" opacity="0.5">~/profiles/omertahirustun — fastfetch</text>

  <!-- Scan line effect -->
  <rect x="0" y="0" width="920" height="40" fill="url(#scanGrad)" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" from="0 -40" to="0 400" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Static scan lines (CRT effect) -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="920" y2="40" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="55" x2="920" y2="55" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="70" x2="920" y2="70" stroke="#00E5FF" stroke-width="1"/>

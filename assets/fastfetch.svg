<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" width="560" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="50%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#050816"/>
    </linearGradient>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#33CCFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="termClip"><rect x="0" y="0" width="560" height="320" rx="10"/></clipPath>
  </defs>

  <style>
    .mono { font: 12px 'Courier New', Consolas, monospace; }
    .mono-sm { font: 11px 'Courier New', Consolas, monospace; }
    .mono-lg { font: bold 13px 'Courier New', Consolas, monospace; }
    .sans-sm { font: 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    @keyframes typeLine {
      from { clip-path: inset(0 100% 0 0); opacity: 0; }
      to { clip-path: inset(0 0% 0 0); opacity: 1; }
    }

    .line { opacity: 0; }
    .l0 { animation: typeLine 0.3s steps(20,end) 0.3s forwards; }
    .l1 { animation: typeLine 0.3s steps(20,end) 0.6s forwards; }
    .l2 { animation: typeLine 0.3s steps(20,end) 0.9s forwards; }
    .l3 { animation: typeLine 0.3s steps(20,end) 1.2s forwards; }
    .l4 { animation: typeLine 0.3s steps(20,end) 1.5s forwards; }
    .l5 { animation: typeLine 0.3s steps(20,end) 1.8s forwards; }
    .l6 { animation: typeLine 0.3s steps(20,end) 2.1s forwards; }
    .l7 { animation: typeLine 0.3s steps(20,end) 2.4s forwards; }
    .l8 { animation: typeLine 0.3s steps(20,end) 2.7s forwards; }
    .l9 { animation: typeLine 0.3s steps(20,end) 3.0s forwards; }
  </style>

  <!-- Background -->
  <rect width="560" height="320" rx="10" fill="url(#bg)" clip-path="url(#termClip)"/>
  <rect x="0.5" y="0.5" width="559" height="319" rx="10" fill="none" stroke="url(#borderGlow)" stroke-width="1.5"/>

  <!-- Corner accents -->
  <path d="M 2 18 L 2 2 L 18 2" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>
  <path d="M 542 2 L 558 2 L 558 18" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>
  <path d="M 2 302 L 2 318 L 18 318" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>
  <path d="M 542 318 L 558 318 L 558 302" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="560" height="28" rx="10" fill="#0D1117"/>
  <rect x="0" y="18" width="560" height="10" fill="#0D1117"/>
  <line x1="0" y1="28" x2="560" y2="28" stroke="#112240" stroke-width="0.5"/>
  <circle cx="16" cy="14" r="5" fill="#009DFF" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#4FC3F7" opacity="0.8"/>
  <circle cx="52" cy="14" r="5" fill="#00E5FF" opacity="0.8"/>
  <text x="72" y="18" class="sans-sm" fill="#4FC3F7" opacity="0.5">~/profiles/omertahirustun</text>

  <!-- Scan line -->
  <rect x="0" y="0" width="560" height="30" fill="#00E5FF" opacity="0.04">
    <animateTransform attributeName="transform" type="translate" from="0 -30" to="0 330" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- CRT scan lines -->
  <g opacity="0.03">
    <line x1="0" y1="45" x2="560" y2="45" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="60" x2="560" y2="60" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="75" x2="560" y2="75" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="90" x2="560" y2="90" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="105" x2="560" y2="105" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="120" x2="560" y2="120" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="135" x2="560" y2="135" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="150" x2="560" y2="150" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="165" x2="560" y2="165" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="180" x2="560" y2="180" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="195" x2="560" y2="195" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="210" x2="560" y2="210" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="225" x2="560" y2="225" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="240" x2="560" y2="240" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="255" x2="560" y2="255" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="270" x2="560" y2="270" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="285" x2="560" y2="285" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="300" x2="560" y2="300" stroke="#00E5FF" stroke-width="1"/>
  </g>

  <!-- COMMAND -->
  <text x="20" y="58" class="mono-lg line l0" fill="#00E5FF" filter="url(#softGlow)">$</text>
  <text x="35" y="58" class="mono-lg line l0" fill="#EAFBFF">fastfetch</text>

  <!-- INFO -->
  <text x="20" y="88" class="mono line l1" fill="#00E5FF">name</text>
  <text x="80" y="88" class="mono line l1" fill="#112240">│</text>
  <text x="95" y="88" class="mono-lg line l1" fill="#EAFBFF" filter="url(#softGlow)">Ömer Tahir Üstün</text>

  <text x="20" y="108" class="mono line l2" fill="#00E5FF">role</text>
  <text x="80" y="108" class="mono line l2" fill="#112240">│</text>
  <text x="95" y="108" class="mono line l2" fill="#4FC3F7">Software Engineer</text>

  <text x="20" y="128" class="mono line l3" fill="#00E5FF">title</text>
  <text x="80" y="128" class="mono line l3" fill="#112240">│</text>
  <text x="95" y="128" class="mono line l3" fill="#EAFBFF">Mobile Developer · Full Stack Developer</text>

  <text x="20" y="148" class="mono line l4" fill="#00E5FF">uni</text>
  <text x="80" y="148" class="mono line l4" fill="#112240">│</text>
  <text x="95" y="148" class="mono line l4" fill="#4FC3F7">Istanbul Sabahattin Zaim Üniversitesi</text>

  <!-- Separator -->
  <line x1="20" y1="162" x2="540" y2="162" stroke="#112240" stroke-width="0.5" opacity="0.4" class="line l4"/>

  <text x="20" y="182" class="mono line l5" fill="#00E5FF">os</text>
  <text x="80" y="182" class="mono line l5" fill="#112240">│</text>
  <text x="95" y="182" class="mono line l5" fill="#EAFBFF">Pardus Linux x86_64</text>

  <text x="20" y="202" class="mono line l6" fill="#00E5FF">back</text>
  <text x="80" y="202" class="mono line l6" fill="#112240">│</text>
  <text x="95" y="202" class="mono-sm line l6" fill="#EAFBFF">ASP.NET Core · MongoDB · Redis · Kafka</text>

  <text x="20" y="222" class="mono line l7" fill="#00E5FF">front</text>
  <text x="80" y="222" class="mono line l7" fill="#112240">│</text>
  <text x="95" y="222" class="mono-sm line l7" fill="#EAFBFF">React Native</text>

  <!-- Separator -->
  <line x1="20" y1="236" x2="540" y2="236" stroke="#112240" stroke-width="0.5" opacity="0.4" class="line l7"/>

  <text x="20" y="256" class="mono line l8" fill="#00E5FF">lang</text>
  <text x="80" y="256" class="mono line l8" fill="#112240">│</text>
  <text x="95" y="256" class="mono-sm line l8" fill="#EAFBFF">TypeScript · JavaScript · HTML · CSS</text>

  <text x="80" y="276" class="mono line l9" fill="#112240">│</text>
  <text x="95" y="276" class="mono-sm line l9" fill="#EAFBFF">C/C++ · C# · .NET Core</text>

  <!-- BOTTOM MOTTO -->
  <text x="280" y="308" class="sans-sm" fill="#00E5FF" text-anchor="middle" opacity="0" filter="url(#glow)">
    ▸ Build. Learn. Repeat.
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.5s" fill="freeze"/>
  </text>
  <rect x="438" y="297" width="2" height="14" fill="#00E5FF" opacity="0">
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Particles -->
  <circle cx="530" cy="50" r="1.2" fill="#00E5FF" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 15,-30" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="300" r="0.8" fill="#4FC3F7" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; -20,-40" dur="5s" begin="2s" repeatCount="indefinite"/>
  </circle>
</svg>

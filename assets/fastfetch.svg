    <line x1="0" y1="175" x2="920" y2="175" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="190" x2="920" y2="190" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="205" x2="920" y2="205" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="220" x2="920" y2="220" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="235" x2="920" y2="235" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="250" x2="920" y2="250" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="265" x2="920" y2="265" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="280" x2="920" y2="280" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="295" x2="920" y2="295" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="310" x2="920" y2="310" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="325" x2="920" y2="325" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="340" x2="920" y2="340" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="355" x2="920" y2="355" stroke="#00E5FF" stroke-width="1"/>
  </g>

  <!-- ═══ LEFT SIDE: ASCII ART LOGO ═══ -->

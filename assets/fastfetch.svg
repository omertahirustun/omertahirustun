<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 370" width="620" height="370">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="50%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#050816"/>
    </linearGradient>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.1"/>
      <stop offset="30%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#33CCFF" stop-opacity="1"/>
      <stop offset="70%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="termClip"><rect x="0" y="0" width="620" height="370" rx="10"/></clipPath>
  </defs>

  <style>
    .mono { font: 12px 'Courier New', Consolas, monospace; }
    .mono-sm { font: 11px 'Courier New', Consolas, monospace; }
    .mono-lg { font: bold 13px 'Courier New', Consolas, monospace; }
    .sans { font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .sans-sm { font: 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    @keyframes typeLine {
      from { clip-path: inset(0 100% 0 0); opacity: 0; }
      to { clip-path: inset(0 0% 0 0); opacity: 1; }
    }
    @keyframes scanMove {
      0% { transform: translateY(-40px); }
      100% { transform: translateY(380px); }
    }

    .line { opacity: 0; }
    .l0 { animation: typeLine 0.3s steps(20,end) 0.3s forwards; }
    .l1 { animation: typeLine 0.3s steps(20,end) 0.6s forwards; }
    .l2 { animation: typeLine 0.3s steps(20,end) 0.9s forwards; }
    .l3 { animation: typeLine 0.3s steps(20,end) 1.2s forwards; }
    .l4 { animation: typeLine 0.3s steps(20,end) 1.5s forwards; }
    .l5 { animation: typeLine 0.3s steps(20,end) 1.8s forwards; }
    .l6 { animation: typeLine 0.3s steps(20,end) 2.1s forwards; }
    .l7 { animation: typeLine 0.3s steps(20,end) 2.4s forwards; }
    .l8 { animation: typeLine 0.3s steps(20,end) 2.7s forwards; }
    .l9 { animation: typeLine 0.3s steps(20,end) 3.0s forwards; }
    .l10 { animation: typeLine 0.3s steps(20,end) 3.3s forwards; }
    .l11 { animation: typeLine 0.3s steps(20,end) 3.6s forwards; }
    .l12 { animation: typeLine 0.3s steps(20,end) 3.9s forwards; }
  </style>

  <!-- Background -->
  <rect width="620" height="370" rx="10" fill="url(#bg)" clip-path="url(#termClip)"/>
  <rect x="0.5" y="0.5" width="619" height="369" rx="10" fill="none" stroke="url(#borderGlow)" stroke-width="1.5"/>

  <!-- Corner accents -->
  <path d="M 2 18 L 2 2 L 18 2" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>
  <path d="M 602 2 L 618 2 L 618 18" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>
  <path d="M 2 352 L 2 368 L 18 368" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>
  <path d="M 602 368 L 618 368 L 618 352" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="620" height="28" rx="10" fill="#0D1117"/>
  <rect x="0" y="18" width="620" height="10" fill="#0D1117"/>
  <line x1="0" y1="28" x2="620" y2="28" stroke="#112240" stroke-width="0.5"/>
  <circle cx="16" cy="14" r="5" fill="#009DFF" opacity="0.8"/>
  <circle cx="34" cy="14" r="5" fill="#4FC3F7" opacity="0.8"/>
  <circle cx="52" cy="14" r="5" fill="#00E5FF" opacity="0.8"/>
  <text x="72" y="18" class="sans-sm" fill="#4FC3F7" opacity="0.5">~/profiles/omertahirustun — fastfetch</text>

  <!-- Scan line -->
  <rect x="0" y="0" width="620" height="30" fill="#00E5FF" opacity="0.04">
    <animateTransform attributeName="transform" type="translate" from="0 -30" to="0 380" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- CRT scan lines -->
  <g opacity="0.03">
    <line x1="0" y1="45" x2="620" y2="45" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="60" x2="620" y2="60" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="75" x2="620" y2="75" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="90" x2="620" y2="90" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="105" x2="620" y2="105" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="120" x2="620" y2="120" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="135" x2="620" y2="135" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="150" x2="620" y2="150" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="165" x2="620" y2="165" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="180" x2="620" y2="180" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="195" x2="620" y2="195" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="210" x2="620" y2="210" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="225" x2="620" y2="225" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="240" x2="620" y2="240" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="255" x2="620" y2="255" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="270" x2="620" y2="270" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="285" x2="620" y2="285" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="300" x2="620" y2="300" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="315" x2="620" y2="315" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="330" x2="620" y2="330" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="345" x2="620" y2="345" stroke="#00E5FF" stroke-width="1"/>
  </g>

  <!-- COMMAND LINE -->
  <text x="20" y="58" class="mono-lg line l0" fill="#00E5FF" filter="url(#softGlow)">$</text>
  <text x="35" y="58" class="mono-lg line l0" fill="#EAFBFF">fastfetch</text>

  <!-- SYSTEM INFO — all left-aligned -->
  <text x="20" y="90" class="mono line l1" fill="#00E5FF">name</text>
  <text x="80" y="90" class="mono line l1" fill="#112240">│</text>
  <text x="95" y="90" class="mono-lg line l1" fill="#EAFBFF" filter="url(#softGlow)">Ömer Tahir Üstün</text>

  <text x="20" y="110" class="mono line l2" fill="#00E5FF">role</text>
  <text x="80" y="110" class="mono line l2" fill="#112240">│</text>
  <text x="95" y="110" class="mono line l2" fill="#4FC3F7">Software Engineer</text>

  <text x="20" y="130" class="mono line l3" fill="#00E5FF">title</text>
  <text x="80" y="130" class="mono line l3" fill="#112240">│</text>
  <text x="95" y="130" class="mono line l3" fill="#EAFBFF">Mobile Developer · Full Stack Developer</text>

  <text x="20" y="150" class="mono line l4" fill="#00E5FF">uni</text>
  <text x="80" y="150" class="mono line l4" fill="#112240">│</text>
  <text x="95" y="150" class="mono line l4" fill="#4FC3F7">Istanbul Sabahattin Zaim Üniversitesi</text>

  <text x="20" y="170" class="mono line l5" fill="#00E5FF">major</text>
  <text x="80" y="170" class="mono line l5" fill="#112240">│</text>
  <text x="95" y="170" class="mono line l5" fill="#EAFBFF">Software Engineering</text>

  <!-- Separator -->
  <line x1="20" y1="185" x2="600" y2="185" stroke="#112240" stroke-width="0.5" opacity="0.4" class="line l5"/>

  <text x="20" y="205" class="mono line l6" fill="#00E5FF">os</text>
  <text x="80" y="205" class="mono line l6" fill="#112240">│</text>
  <text x="95" y="205" class="mono line l6" fill="#EAFBFF">Arch Linux x86_64</text>

  <text x="20" y="225" class="mono line l7" fill="#00E5FF">kernel</text>
  <text x="80" y="225" class="mono line l7" fill="#112240">│</text>
  <text x="95" y="225" class="mono line l7" fill="#EAFBFF">6.x.x-zen1-1-zen</text>

  <text x="20" y="245" class="mono line l8" fill="#00E5FF">shell</text>
  <text x="80" y="245" class="mono line l8" fill="#112240">│</text>
  <text x="95" y="245" class="mono line l8" fill="#EAFBFF">zsh 5.9</text>

  <text x="20" y="265" class="mono line l9" fill="#00E5FF">editor</text>
  <text x="80" y="265" class="mono line l9" fill="#112240">│</text>
  <text x="95" y="265" class="mono line l9" fill="#EAFBFF">Neovim 0.10+</text>

  <text x="20" y="285" class="mono line l10" fill="#00E5FF">ide</text>
  <text x="80" y="285" class="mono line l10" fill="#112240">│</text>
  <text x="95" y="285" class="mono line l10" fill="#EAFBFF">JetBrains Rider · VS Code</text>

  <!-- Separator -->
  <line x1="20" y1="298" x2="600" y2="298" stroke="#112240" stroke-width="0.5" opacity="0.4" class="line l10"/>

  <text x="20" y="318" class="mono line l11" fill="#00E5FF">back</text>
  <text x="80" y="318" class="mono line l11" fill="#112240">│</text>
  <text x="95" y="318" class="mono-sm line l11" fill="#EAFBFF">ASP.NET Core · MongoDB · Redis · Kafka</text>

  <text x="20" y="338" class="mono line l12" fill="#00E5FF">front</text>
  <text x="80" y="338" class="mono line l12" fill="#112240">│</text>
  <text x="95" y="338" class="mono-sm line l12" fill="#EAFBFF">React Native</text>

  <!-- BOTTOM MOTTO -->
  <text x="310" y="362" class="sans" fill="#00E5FF" text-anchor="middle" opacity="0" filter="url(#glow)">
    ▸ Build. Learn. Repeat.
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.2s" fill="freeze"/>
  </text>
  <rect x="488" y="351" width="2" height="14" fill="#00E5FF" opacity="0">
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="4.7s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <circle cx="590" cy="50" r="1.2" fill="#00E5FF" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 15,-30" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="340" r="0.8" fill="#4FC3F7" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; -20,-40" dur="5s" begin="2s" repeatCount="indefinite"/>
  </circle>
</svg>
